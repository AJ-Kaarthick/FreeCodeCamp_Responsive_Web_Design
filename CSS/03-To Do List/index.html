<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>Weekly Study &amp; Coding Goals</h1>

    <ul class="todo-list">
        <!-- Item 1 -->
        <li>
            <input type="checkbox" id="task-cxx">
            <label for="task-cxx">Review C++ OOP Principles &amp; Pointers</label>
            <ul class="sub-item">
                <li><a class="sub-item-link" href="https://en.cppreference.com/w/" target="_blank">C++ Reference Manual</a></li>
            </ul>
        </li>

        <!-- Item 2 -->
        <li>
            <input type="checkbox" id="task-japanese">
            <label for="task-japanese">Practice JLPT N5 Vocabulary &amp; Kanji</label>
            <ul class="sub-item">
                <li><a class="sub-item-link" href="https://jisho.org" target="_blank">Jisho Japanese Dictionary</a></li>
            </ul>
        </li>

        <!-- Item 3 -->
        <li>
            <input type="checkbox" id="task-tennis">
            <label for="task-tennis">Schedule Evening Tennis Session</label>
            <ul class="sub-item">
                <li><a class="sub-item-link" href="https://www.atptour.com" target="_blank">ATP Tour Official Site</a></li>
            </ul>
        </li>

        <!-- Item 4 -->
        <li>
            <input type="checkbox" id="task-dsa">
            <label for="task-dsa">Implement AVL Tree Data Structure</label>
            <ul class="sub-item">
                <li><a class="sub-item-link" href="https://geeksforgeeks.org" target="_blank">GeeksforGeeks Algorithms Guide</a></li>
            </ul>
        </li>
    </ul>
</body>

</html>
